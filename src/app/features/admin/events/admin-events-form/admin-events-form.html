<div class="bg-[#1a1d23] p-8 rounded-2xl border border-gray-800">
  <div class="flex items-center justify-between mb-6 border-b border-gray-800 pb-4">
    <h2 class="text-xl font-bold text-white">
      {{ eventToEdit() ? 'Editar Evento' : 'Novo Evento' }}
    </h2>
    <button (click)="onFinish.emit(null)" class="text-gray-400 hover:text-white">
       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </button>
  </div>

  <form class="space-y-5" [formGroup]="eventForm" (ngSubmit)="onSubmit()">
    <div>
      <label class="block text-sm font-medium leading-6 text-gray-300">Nome do evento</label>
      <input
        formControlName="name"
        type="text"
        placeholder="Ex: Festival de Verão 2026"
        class="mt-2 block w-full rounded-xl border-gray-700 bg-[#0f1115] py-2 text-white shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 px-3 outline-none"
      />
      @if (eventForm.get('name')?.invalid && eventForm.get('name')?.touched) {
        <p class="mt-1 text-xs text-red-500">Informe o nome do evento.</p>
      }
    </div>

    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
      <div>
        <label class="block text-sm font-medium leading-6 text-gray-300">Data</label>
        <input
          formControlName="dateTime"
          type="datetime-local"
          class="mt-2 block w-full rounded-xl border-gray-700 bg-[#0f1115] py-2 text-white shadow-sm ring-1 ring-inset ring-gray-700 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 px-3 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium leading-6 text-gray-300">Local</label>
        <input
          formControlName="location"
          type="text"
          placeholder="Ex: Arena Central"
          class="mt-2 block w-full rounded-xl border-gray-700 bg-[#0f1115] py-2 text-white shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 px-3 outline-none"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium leading-6 text-gray-300">Descrição</label>
      <textarea
        formControlName="description"
        rows="4"
        placeholder="Detalhes sobre o evento..."
        class="mt-2 block w-full rounded-xl border-gray-700 bg-[#0f1115] py-2 text-white shadow-sm ring-1 ring-inset ring-gray-700 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 px-3 outline-none"
      ></textarea>
    </div>

    <div class="mt-8 border-t border-gray-800 pt-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-300">Setores</h3>
        <button
          type="button"
          (click)="addSector()"
          class="px-3 py-1.5 bg-indigo-600/20 text-indigo-400 text-xs font-bold rounded-lg border border-indigo-600/30 hover:bg-indigo-600/40 transition-colors uppercase tracking-wider"
        >
          + Add Setor
        </button>
      </div>

      <div formArrayName="sectors" class="space-y-4 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
        <div
          *ngFor="let sector of sectors.controls; let i = index"
          [formGroupName]="i"
          class="flex flex-col md:flex-row items-end gap-3 p-4 bg-[#0f1115] rounded-xl border border-gray-800"
        >
          <div class="w-full md:flex-1">
            <input formControlName="name" placeholder="Nome do Setor" class="w-full bg-transparent border-b border-gray-700 text-white focus:border-indigo-500 outline-none text-sm py-1" />
          </div>

          <div class="w-full md:w-24">
            <label class="text-[10px] text-gray-500 uppercase font-bold">Capacidade</label>
            <input type="number" formControlName="capacity" class="w-full bg-transparent border-b border-gray-700 text-white focus:border-indigo-500 outline-none text-sm py-1" />
          </div>

          <div class="w-full md:w-28">
            <label class="text-[10px] text-gray-500 uppercase font-bold">Preço (R$)</label>
            <input type="number" formControlName="preco" class="w-full bg-transparent border-b border-gray-700 text-white focus:border-indigo-500 outline-none text-sm py-1" />
          </div>

          <button type="button" (click)="removeSector(i)" class="text-red-500 hover:text-red-400 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="pt-6 flex items-center justify-end gap-4 border-t border-gray-800">
      <button
        type="button"
        (click)="cancelar()"
        class="px-6 py-2.5 text-sm font-semibold text-gray-400 hover:text-white transition-colors"
      >
        Cancelar
      </button>

      <button
        type="submit"
        class="rounded-xl bg-indigo-600 px-8 py-2.5 text-sm font-bold text-white shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 disabled:opacity-50 transition-all active:scale-95"
        [disabled]="eventForm.invalid || isSubmitting()"
      >
        {{ isSubmitting() ? 'Salvando...' : (eventToEdit() ? 'Salvar Alterações' : 'Criar Evento') }}
      </button>
    </div>
  </form>
</div>
