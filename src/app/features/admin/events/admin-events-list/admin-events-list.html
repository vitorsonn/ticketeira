<div class="min-h-screen bg-[#0f1115] p-8">
  <div class="max-w-6xl mx-auto">
    <div class="flex items-center justify-between mb-10">
      <div>
        <h1 class="text-3xl font-bold text-white tracking-tight">Gerenciar Eventos</h1>
        <p class="text-gray-500 mt-1">Total de {{ events().length }} eventos cadastrados</p>
      </div>

      <button
        class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-600/20 active:scale-95"

      (click)="abrirModalCadastro()"
        >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          />
        </svg>
        Novo Evento
      </button>
    </div>

   <div class="flex flex-col gap-4 max-w-6xl mx-auto">
  @for (item of events(); track item.id) {
    <app-event-card
      [event]="item"
      [isAdmin]="true"
      (onEdit)="abrirModalEdicao($event)"
      (onDelete)="deleteEventById($event)"> </app-event-card>
  }

  @if (isModalOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-in fade-in duration-200">
    <div class="w-full max-w-3xl max-h-[90vh] overflow-y-auto custom-scrollbar">

      <app-admin-events-form
        [eventToEdit]="selectedEvent()"
        (onFinish)="handleFinish($event)">
      </app-admin-events-form>
</div>
  </div>
}
</div>
