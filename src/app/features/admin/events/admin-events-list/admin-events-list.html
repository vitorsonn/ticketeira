
<div class="max-w-6xl mx-auto p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Eventos</h1>

    <button
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
      Novo Evento
    </button>
  </div>

  <!-- Lista -->
   <div class="grid gap-6">

  <div
    *ngFor="let event of events()"
    class="group bg-gray-900 border border-gray-800 hover:border-indigo-500/50 rounded-2xl p-5 flex justify-between items-center transition-all duration-300 hover:shadow-[0_0_20px_rgba(79,70,229,0.1)]"
  >

    <div class="flex-1 pr-6">
      <div class="flex items-center gap-3 mb-2">
        <h2 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors">
          {{ event.name }}
        </h2>
        <span class="px-2 py-0.5 text-[10px] uppercase tracking-wider font-bold bg-green-500/10 text-green-500 border border-green-500/20 rounded-full">
          Ativo
        </span>
      </div>

      <p class="text-gray-400 text-sm line-clamp-2 max-w-2xl leading-relaxed">
        {{ event.description }}
      </p>

      <div class="flex flex-wrap items-center gap-y-2 gap-x-6 mt-4 text-sm font-medium text-gray-500">
        <div class="flex items-center gap-1.5">
          <span class="text-indigo-500">📍</span>
          {{ event.location }}
        </div>
        <div class="flex items-center gap-1.5">
          <span class="text-indigo-500">📅</span>
          {{ event.dateTime | date:'dd/MM/yyyy' }}
        </div>
        <div class="flex items-center gap-1.5 border-l border-gray-800 pl-6">
          <span class="text-indigo-500">🕒</span>
          {{ event.dateTime | date:'HH:mm' }}
        </div>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-3">
      <button
        class="flex items-center justify-center gap-2 bg-gray-800 hover:bg-indigo-600 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition-all active:scale-95 shadow-lg shadow-black/20"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        Editar
      </button>

      <button
        (click)="deleteEventById(event)"
        class="flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white border border-red-500/20 px-5 py-2.5 rounded-xl text-sm transition-all active:scale-95 shadow-lg"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Deletar
      </button>
    </div>

  </div>
</div>


</div>
