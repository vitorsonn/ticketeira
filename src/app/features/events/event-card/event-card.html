<div class="flex items-center justify-between p-6 text-white bg-[#1a1d23] border border-gray-800/50 rounded-2xl shadow-xl transition-all duration-300 hover:scale-[1.01] hover:border-indigo-500/50 group">

  <!-- Lado Esquerdo: Informações do Evento -->
  <div class="flex-1">
    <div class="flex items-center gap-3 mb-2">
      <h3 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors uppercase tracking-tight">
        {{ event().name }}
      </h3>
      <!-- Badge de Status (Opcional, baseado no seu layout anterior) -->
      <span class="px-2 py-0.5 text-[10px] font-bold uppercase bg-green-500/10 text-green-400 border border-green-500/20 rounded-lg">
        Ativo
      </span>
    </div>

    <p class="mb-5 text-sm text-gray-400 max-w-2xl line-clamp-2">
      {{ event().description }}
    </p>

    <!-- Detalhes: Local, Data e Hora -->
    <div class="flex flex-wrap gap-8 text-sm text-gray-500">
      <!-- Localização -->
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="text-gray-300">{{ event().location }}</span>
      </div>

      <!-- Data -->
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span>{{ event().dateTime | date: 'dd/MM/yyyy' }}</span>
      </div>

      <!-- Horário -->
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ event().dateTime | date: 'HH:mm' }}</span>
      </div>
    </div>
  </div>

  <!-- Lado Direito: Ações (Botões) -->
  <div class="flex items-center gap-3 ml-8">
    @if (isAdmin()) {
      <!-- Botão Editar -->
      <button (click)="handleEdit()"
              class="flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-300 bg-gray-800/50 border border-gray-700 rounded-xl hover:bg-gray-700 hover:text-white transition-all active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        Editar
      </button>

      <!-- Botão Deletar -->
      <button (click)="handleDelete()"
              class="flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl hover:bg-red-500 hover:text-white transition-all active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Deletar
      </button>
    } @else {
      <!-- Botão Usuário (Comprar) -->
      <button (click)="onView.emit(event())"
              class="whitespace-nowrap px-8 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 shadow-lg shadow-indigo-500/20 transition-all active:scale-95 uppercase tracking-wider">
        Comprar Ingressos
      </button>
    }
  </div>
</div>
